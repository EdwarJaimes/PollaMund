        document.getElementById('init-matches-btn').onclick = async () => {
            const btn = document.getElementById('init-matches-btn');
            btn.disabled = true;
            log("--- Iniciando importación de partidos ---");
            
            const lines = csvData.split('\n').slice(1); // Saltar cabecera
            let count = 0;

            for (const line of lines) {
                if (!line.trim()) continue;
                const [idEvent, strTimestamp, Round, HomeTeam, HomeScore, AwayTeam, AwayScore, Poster, Thumb] = line.split(',');

                try {
                    // Usamos setDoc con idEvent como ID del documento para evitar duplicados
                    await setDoc(doc(db, "partidos", idEvent), {
                        idEvent,
                        fecha: Timestamp.fromDate(new Date(strTimestamp)),
                        ronda: Round,
                        local: HomeTeam,
                        visitante: AwayTeam,
                        goles_local: HomeScore || null,
                        goles_visitante: AwayScore || null,
                        poster: Poster,
                        thumb: Thumb
                    });
                    log(`✅ Importado: ${HomeTeam} vs ${AwayTeam}`, 'success');
                    count++;
                } catch (e) {
                    log(`❌ Error en partido ${idEvent}: ${e.message}`, 'error');
                }
            }

            log(`--- Importación finalizada: ${count} partidos ---`, 'success');
            btn.disabled = false;
        };
    </script>
</body>
</html>
